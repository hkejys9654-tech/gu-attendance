<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>구역 출석관리 시스템</title>
  <meta name="theme-color" content="#0b4fb3">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{--primary:#0b4fb3;--primary-dark:#063a91;--primary-soft:#eaf3ff;--navy:#1b3a6b;--green:#2ecc71;--pink:#ec5f97;--purple:#8e5be8;--bg:#f3f6fb;--card:#fff;--line:#e5edf7;--text:#27364a;--muted:#8b98aa;--danger:#e53935;--save:#0f9d4f}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;user-select:none;-webkit-tap-highlight-color:transparent}button,select,input{font-family:inherit}button{border:none;cursor:pointer}button:active{transform:scale(.985)}button:disabled{opacity:.55;cursor:not-allowed}
    header{position:sticky;top:0;z-index:100;color:#fff;background:linear-gradient(145deg,var(--primary-dark),var(--primary));padding:18px 16px 0;box-shadow:0 5px 18px rgba(11,79,179,.3)}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.brand-wrap{display:flex;align-items:center;gap:11px}.brand-icon{width:48px;height:48px;border-radius:18px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center}.brand-icon i{width:29px;height:29px}h1{font-size:1.25rem;font-weight:950;white-space:nowrap}
    .selector-card{position:relative;z-index:2;background:#fff;border-radius:16px;margin:0 0 -30px;padding:10px 8px;box-shadow:0 6px 18px rgba(15,47,86,.18);display:grid;grid-template-columns:1fr 1.35fr 1.1fr;overflow:hidden}.select-wrap{display:flex;align-items:center;gap:6px;padding:0 7px;border-right:1px solid var(--line)}.select-wrap:last-child{border-right:none}.select-wrap i{width:18px;height:18px;color:var(--primary);flex-shrink:0}.selector-card select,.selector-card input{width:100%;min-width:0;border:none;background:#fff;color:var(--text);font-size:.9rem;font-weight:850;appearance:none;text-align:center;padding:8px 2px}
    main{padding:44px 14px 86px}.card,.member-section{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 4px 16px rgba(24,55,96,.07);border:1px solid rgba(232,237,245,.82)}.summary-card{display:grid;grid-template-columns:1.2fr .9fr;align-items:center;gap:12px}.summary-left{display:flex;align-items:center;gap:13px}.circle-icon{width:58px;height:58px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center}.summary-title{font-size:.96rem;font-weight:950;margin-bottom:6px}.summary-num,.rate-num{color:var(--primary);font-size:2.05rem;font-weight:950;line-height:1}.summary-num .unit,.rate-num span{font-size:.9rem}.summary-sub{font-size:.95rem;color:#687789;font-weight:750;margin-left:5px}.summary-right{border-left:1px solid var(--line);text-align:center;padding-left:10px}.rate-label{font-size:.8rem;color:#667;font-weight:850;margin-bottom:7px}
    .save-indicator{text-align:right;font-size:.78rem;color:var(--muted);margin:-4px 0 8px;min-height:16px;font-weight:750}.save-indicator.unsaved{color:#e67e22}.save-indicator.saved{color:var(--save)}.big-action{width:100%;min-height:74px;border-radius:16px;color:#fff;display:flex;align-items:center;gap:13px;padding:14px 16px;box-shadow:0 4px 14px rgba(24,55,96,.14);text-align:left;background:linear-gradient(145deg,#10a858,#07863f);margin-bottom:14px}.big-action i{width:34px;height:34px}.big-text{font-size:1.1rem;font-weight:950}.small-text{font-size:.76rem;opacity:.9;font-weight:750;margin-top:3px}
    .section-title,.member-section-header{display:flex;align-items:center;gap:8px;font-size:.98rem;font-weight:950;color:var(--navy);margin-bottom:12px}.section-title i{width:22px;height:22px;color:var(--primary)}.category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.cat-card{border:1px solid var(--line);border-radius:14px;padding:11px 7px 10px;background:#fff;text-align:center}.cat-icon{width:40px;height:40px;margin:0 auto 6px;border-radius:50%;display:flex;align-items:center;justify-content:center}.cat-name{font-size:.78rem;font-weight:950;color:#444;margin-bottom:5px}.cat-count{font-size:1.16rem;font-weight:950}.slash{color:#8995a7;font-size:.86rem}.cat-rate{font-size:.82rem;color:var(--primary);font-weight:950;margin:5px 0 7px}.progress{height:8px;background:#e8eef7;border-radius:9px;overflow:hidden}.progress>div{height:100%;border-radius:9px}.cat-eun .cat-icon{background:#edf4ff;color:var(--primary)}.cat-bong .cat-icon{background:#eafaef;color:var(--green)}.cat-mom .cat-icon{background:#fff0f6;color:var(--pink)}.cat-youth .cat-icon{background:#f3edff;color:var(--purple)}.cat-eun .progress>div{background:var(--primary)}.cat-bong .progress>div{background:var(--green)}.cat-mom .progress>div{background:var(--pink)}.cat-youth .progress>div{background:var(--purple)}
    .member-section{padding:14px;scroll-margin-top:160px}.member-section-header{cursor:pointer}.mini-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}.cat-sub{font-size:.82rem;color:var(--muted);font-weight:850;margin-left:5px}.fold-mark{margin-left:auto;color:#9aa6b6}.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:9px}.member-btn{position:relative;background:#fff;border:1.5px solid #d7dfeb;color:#2d3748;min-height:48px;padding:10px 8px;text-align:center;border-radius:10px;font-size:.92rem;font-weight:850}.member-btn.active{font-weight:950;border-width:2px}.member-btn.active:after{content:"✓";position:absolute;right:-6px;top:-7px;width:20px;height:20px;border-radius:50%;color:#fff;font-size:.78rem;display:flex;align-items:center;justify-content:center;font-weight:950}.active.eun{border-color:var(--primary);color:var(--primary);background:#f4f8ff}.active.bong{border-color:var(--green);color:#13964d;background:#f1fff6}.active.mom{border-color:var(--pink);color:var(--pink);background:#fff5fa}.active.youth{border-color:var(--purple);color:var(--purple);background:#f8f3ff}.active.eun:after{background:var(--primary)}.active.bong:after{background:var(--green)}.active.mom:after{background:var(--pink)}.active.youth:after{background:var(--purple)}
    .record-status{background:#e8f5e9;border-left:4px solid var(--save);padding:9px 12px;font-size:.8rem;color:#1b5e20;margin-bottom:12px;border-radius:8px;font-weight:750}.empty-msg{text-align:center;color:#aaa;padding:28px 0;font-size:.9rem;line-height:1.55}.bottom-tools{position:fixed;left:14px;right:14px;bottom:12px;z-index:120;background:#fff;border-radius:18px;box-shadow:0 8px 24px rgba(24,55,96,.18);border:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden}.tool-btn{background:#fff;padding:10px 4px;color:#536174;font-weight:850;font-size:.74rem;border-right:1px solid var(--line)}.tool-btn i{display:block;margin:0 auto 4px;width:22px;height:22px;color:var(--primary)}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:1000;justify-content:center;align-items:center}.modal.show{display:flex}.modal-content{background:#fff;width:90%;max-width:500px;max-height:85vh;border-radius:18px;padding:20px;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.22)}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.modal-header h2{font-size:1.05rem;color:var(--navy);font-weight:950}.close-modal{font-size:1.5rem;color:#aaa;background:none}.help-text{font-size:.8rem;color:#666;margin-bottom:15px;line-height:1.45}.btn-save{background:var(--primary);color:#fff;width:100%;border-radius:12px;padding:13px;font-size:.95rem;font-weight:850}.setup-cat-block{margin-bottom:18px}.setup-cat-label{font-size:.9rem;font-weight:950;margin-bottom:8px;padding-left:8px;border-left:4px solid}.eun{border-left-color:var(--primary);color:var(--primary)}.bong{border-left-color:var(--green);color:var(--green)}.mom{border-left-color:var(--pink);color:var(--pink)}.youth{border-left-color:var(--purple);color:var(--purple)}.setup-name-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}.setup-name-row{display:flex;align-items:center;gap:8px}.setup-name-input{flex:1;padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:1rem;background:#fff;outline:none}.btn-remove-name{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#fee2e2;color:#e53e3e;font-size:1.2rem;font-weight:900}.btn-add-name{width:100%;padding:11px;border-radius:10px;border:2px dashed #d0d7de;background:#f8f9fa;color:#666;font-size:.95rem;font-weight:850}.share-options{display:flex;gap:10px;margin-bottom:10px}.share-options button{flex:1;padding:14px;border-radius:12px;font-weight:850}.btn-share-text{background:var(--navy);color:#fff}.btn-share-image{background:var(--save);color:#fff}.share-preview{background:#f8f9fa;border:1px solid #eee;border-radius:10px;padding:15px;font-size:.9rem;white-space:pre-line;line-height:1.6;margin-top:10px;color:#333}
    .stats-tabs,.stats-main-tabs,.personal-cat-tabs,.personal-type-tabs{display:flex;gap:6px;margin-bottom:12px}.stats-tab,.stats-main-tab,.personal-cat-tab,.personal-type-tab{flex:1;padding:9px 4px;border:2px solid #e0e0e0;border-radius:9px;background:#fff;font-size:.78rem;font-weight:850;color:#888;text-align:center}.active-tab{border-color:var(--primary);color:var(--primary);background:#eef5ff}.stats-table{width:100%;border-collapse:collapse;font-size:.85rem}.stats-table th,.stats-table td{border:1px solid #eee;padding:9px 5px;text-align:center}.stats-table th{background:#f8f9fa;color:#444;font-weight:850}.capture-card{position:fixed;top:-9999px;left:-9999px;width:480px;background:linear-gradient(135deg,#fff 0%,#f0f6ff 100%);padding:28px 24px;border-radius:16px}.cap-title{font-size:1.3rem;font-weight:900;color:var(--navy);text-align:center;margin-bottom:6px}.cap-sub{text-align:center;color:#666;font-size:.95rem;margin-bottom:18px;padding-bottom:14px;border-bottom:1.5px dashed #cfd8e3}.cap-cat-title{font-size:1rem;font-weight:900;margin:0 0 10px;padding-left:9px;border-left:4px solid}.cap-name-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.cap-name-btn{background:#fff;border:2px solid #ddd;color:#aaa;padding:14px 6px;text-align:center;border-radius:10px;font-size:.95rem}.cap-name-btn.active{font-weight:900;border-width:3px}.cap-total{margin-top:18px;padding:14px;background:var(--primary);color:#fff;text-align:center;border-radius:8px;font-size:1.15rem;font-weight:900}
    @media(max-width:390px){h1{font-size:1.08rem}.brand-icon{width:42px;height:42px;border-radius:15px}.selector-card{grid-template-columns:.9fr 1.25fr 1fr}.selector-card select,.selector-card input{font-size:.78rem}.summary-num,.rate-num{font-size:1.74rem}.category-grid{grid-template-columns:repeat(2,1fr)}.bottom-tools{left:10px;right:10px}}
  </style>
</head>
<body>
<header><div class="top-bar"><div class="brand-wrap"><div class="brand-icon"><i data-lucide="book-open-check"></i></div><h1>구역 출석관리 시스템</h1></div></div><div class="selector-card"><div class="select-wrap"><i data-lucide="map-pin"></i><select id="district-select"></select></div><div class="select-wrap"><i data-lucide="calendar-days"></i><input type="date" id="date-select"></div><div class="select-wrap"><i data-lucide="book-open"></i><select id="meeting-type"><option>주일말씀</option><option>수요말씀</option><option>구역모임</option></select></div></div></header>
<main><div id="record-status-wrap"></div><section id="summary-wrap" class="card summary-card"><div class="summary-left"><div class="circle-icon"><i data-lucide="check-circle"></i></div><div><div class="summary-title">오늘 출석</div><span class="summary-num" id="summary-attended">0<span class="unit">명</span></span><span class="summary-sub" id="summary-total">/ 전체 0명</span></div></div><div class="summary-right"><div class="rate-label">출석률</div><div class="rate-num" id="summary-rate">0<span>%</span></div></div></section><section class="card"><div class="section-title"><i data-lucide="layout-grid"></i>분류별 현황</div><div class="category-grid" id="category-summary-grid"></div></section><section id="attendance-content"></section><div class="save-indicator" id="save-indicator">&nbsp;</div><button class="big-action" id="btn-save-record" type="button"><i data-lucide="save"></i><div><div class="big-text">저장하기</div><div class="small-text">내 기기에 기록 저장</div></div></button></main>
<div class="bottom-tools"><button class="tool-btn btn-setup" type="button"><i data-lucide="users-round"></i>명단설정</button><button class="tool-btn btn-prayer" type="button"><i data-lucide="clipboard-list"></i>기도명단</button><button class="tool-btn btn-share" type="button"><i data-lucide="share-2"></i>공유하기</button><button class="tool-btn btn-stats" type="button"><i data-lucide="bar-chart-3"></i>통계보기</button></div>
<div class="modal" id="setup-modal"><div class="modal-content"><div class="modal-header"><h2>명단 설정 <span id="setup-district-label" style="color:#888;font-size:.85rem;font-weight:normal"></span></h2><button class="close-modal" type="button">&times;</button></div><div class="help-text">각 분류별 이름을 입력하고 저장하세요. 자료는 이 기기의 브라우저에 저장됩니다.</div><div id="setup-cat-list"></div><button class="btn-save" id="save-setup">저장하기</button></div></div>
<div class="modal" id="share-modal"><div class="modal-content"><div class="modal-header"><h2>공유하기</h2><button class="close-modal" type="button">&times;</button></div><div class="share-options"><button class="btn-share-text" id="btn-share-text" type="button">텍스트 복사</button><button class="btn-share-image" id="btn-share-image" type="button">이미지 만들기</button></div><div class="help-text">미리보기</div><div class="share-preview" id="share-preview"></div><div id="image-preview-wrap" style="display:none;text-align:center;margin-top:15px"><img id="image-preview" alt="출석 이미지" style="max-width:100%;border-radius:12px;border:1px solid #eee"><button class="btn-save" id="btn-download-image" style="margin-top:10px">이미지 파일 다운로드</button></div></div></div>
<div class="modal" id="stats-modal"><div class="modal-content"><div class="modal-header"><h2>출석 통계</h2><button class="close-modal" type="button">&times;</button></div><div class="stats-tabs" id="stats-tabs"><button class="stats-tab active-tab" data-type="주일말씀" type="button">주일말씀</button><button class="stats-tab" data-type="수요말씀" type="button">수요말씀</button><button class="stats-tab" data-type="구역모임" type="button">구역모임</button></div><div id="stats-container"></div></div></div>
<div class="modal" id="prayer-modal"><div class="modal-content"><div class="modal-header"><h2>기도명단</h2><button class="close-modal" type="button">&times;</button></div><div class="help-text">간단 기도명단 메모입니다.</div><textarea id="prayer-text" style="width:100%;height:260px;border:2px solid #e0e0e0;border-radius:12px;padding:12px;font-size:.95rem"></textarea><button class="btn-save" id="save-prayer" style="margin-top:10px">저장하기</button></div></div>
<div class="capture-card" id="capture-card"><div class="cap-title" id="cap-title"></div><div class="cap-sub" id="cap-sub"></div><div id="cap-categories"></div><div class="cap-total" id="cap-total"></div></div>
<script>
const STORAGE_KEY_MEMBERS='guAttendance_members_v2',STORAGE_KEY_RECORDS='guAttendance_records_v2',STORAGE_KEY_LASTDISTRICT='guAttendance_lastDistrict',STORAGE_KEY_PRAYERS='guPrayerList_v1';
const CATEGORIES={EUN:{key:'eun',name:'은장회',btnClass:'eun',cardClass:'cat-eun',rowClass:'eun-row',icon:'users-round'},BONG:{key:'bong',name:'봉사회',btnClass:'bong',cardClass:'cat-bong',rowClass:'bong-row',icon:'hand-heart'},MOM:{key:'mom',name:'어머니회',btnClass:'mom',cardClass:'cat-mom',rowClass:'mom-row',icon:'heart'},YOUTH:{key:'youth',name:'청년회',btnClass:'youth',cardClass:'cat-youth',rowClass:'youth-row',icon:'sparkles'}};
const CAT_ORDER=['EUN','BONG','MOM','YOUTH'];let allMembersData={},allAttendanceRecords={},allPrayerData={},workingRecord=[],isDirty=false,lastGeneratedImageBlob=null,lastGeneratedImageFilename='',currentStatsType='주일말씀',previousMeetingType='주일말씀';
const elDistrict=document.getElementById('district-select'),elDate=document.getElementById('date-select'),elType=document.getElementById('meeting-type'),elAttendance=document.getElementById('attendance-content'),elSaveIndicator=document.getElementById('save-indicator'),elBtnSaveRecord=document.getElementById('btn-save-record'),elRecordStatusWrap=document.getElementById('record-status-wrap');
function refreshIcons(){if(window.lucide)window.lucide.createIcons()}function buildDistrictDropdown(){let html='';[10,20,30,40].forEach(base=>{for(let i=1;i<=5;i++){const name=`${base+i}구역`;html+=`<option value="${name}">${name}</option>`}});elDistrict.innerHTML=html;elDistrict.value=localStorage.getItem(STORAGE_KEY_LASTDISTRICT)||'11구역'}
function loadData(){allMembersData=JSON.parse(localStorage.getItem(STORAGE_KEY_MEMBERS)||'{}');allAttendanceRecords=JSON.parse(localStorage.getItem(STORAGE_KEY_RECORDS)||'{}');allPrayerData=JSON.parse(localStorage.getItem(STORAGE_KEY_PRAYERS)||'{}')}function saveMembers(){localStorage.setItem(STORAGE_KEY_MEMBERS,JSON.stringify(allMembersData))}function saveRecords(){localStorage.setItem(STORAGE_KEY_RECORDS,JSON.stringify(allAttendanceRecords))}
function getMembers(){const d=elDistrict.value;if(!allMembersData[d])allMembersData[d]={eun:[],bong:[],mom:[],youth:[]};return allMembersData[d]}function getRecords(){const d=elDistrict.value;if(!allAttendanceRecords[d])allAttendanceRecords[d]={};return allAttendanceRecords[d]}
function loadWorkingRecord(){const records=getRecords(),date=elDate.value,type=elType.value,saved=records[date]&&records[date][type];workingRecord=saved?[...saved]:[];isDirty=false;updateSaveIndicator(!!saved);updateRecordStatusBanner(!!saved);renderAttendanceGrid()}
function getTotals(){const m=getMembers();let total=0,attended=0;CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],names=m[c.key]||[];total+=names.length;attended+=names.filter(n=>workingRecord.includes(n)).length});return{total,attended,rate:total?Math.round(attended/total*100):0}}
function updateSummary(){const t=getTotals();document.getElementById('summary-attended').innerHTML=`${t.attended}<span class="unit">명</span>`;document.getElementById('summary-total').textContent=`/ 전체 ${t.total}명`;document.getElementById('summary-rate').innerHTML=`${t.rate}<span>%</span>`}
function updateSaveIndicator(saved){if(isDirty){elSaveIndicator.textContent='● 저장되지 않은 변경사항이 있습니다';elSaveIndicator.className='save-indicator unsaved';elBtnSaveRecord.disabled=false}else if(saved){elSaveIndicator.textContent='✓ 저장되었습니다';elSaveIndicator.className='save-indicator saved';elBtnSaveRecord.disabled=true}else{elSaveIndicator.textContent='출석 체크 후 [저장하기]를 눌러주세요';elSaveIndicator.className='save-indicator';elBtnSaveRecord.disabled=false}}
function updateRecordStatusBanner(saved){elRecordStatusWrap.innerHTML=saved?'<div class="record-status">이 날짜에 저장된 기록을 불러왔습니다. 수정 후 다시 저장하면 덮어쓰기 됩니다.</div>':''}
function renderCategorySummary(){const m=getMembers(),grid=document.getElementById('category-summary-grid');grid.innerHTML='';CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],names=m[c.key]||[],att=names.filter(n=>workingRecord.includes(n)).length,rate=names.length?Math.round(att/names.length*100):0;const card=document.createElement('button');card.type='button';card.className=`cat-card ${c.cardClass}`;card.innerHTML=`<div class="cat-icon"><i data-lucide="${c.icon}"></i></div><div class="cat-name">${c.name}</div><div class="cat-count">${att}<span class="slash"> / ${names.length}명</span></div><div class="cat-rate">${rate}%</div><div class="progress"><div style="width:${Math.min(rate,100)}%"></div></div>`;card.onclick=()=>document.getElementById(`section-${c.key}`)?.scrollIntoView({behavior:'smooth',block:'start'});grid.appendChild(card)});refreshIcons()}
function renderAttendanceGrid(){const m=getMembers(),has=CAT_ORDER.some(k=>(m[CATEGORIES[k].key]||[]).length);if(!has){elAttendance.innerHTML=`<div class="card"><div class="empty-msg">${elDistrict.value} 명단이 비어있습니다.<br>하단 명단설정을 눌러 입력해주세요.</div></div>`;updateSummary();renderCategorySummary();return}elAttendance.innerHTML='';CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],names=m[c.key]||[];if(!names.length)return;const section=document.createElement('section');section.className='member-section';section.id=`section-${c.key}`;section.innerHTML=`<div class="member-section-header"><div class="mini-icon ${c.cardClass}"><div class="cat-icon" style="width:34px;height:34px;margin:0"><i data-lucide="${c.icon}"></i></div></div><div class="cat-title-text ${c.btnClass}">${c.name}</div><div class="cat-sub"></div><div class="fold-mark"><i data-lucide="chevron-up"></i></div></div><div class="member-grid"></div>`;const grid=section.querySelector('.member-grid'),header=section.querySelector('.member-section-header');header.onclick=()=>{grid.style.display=grid.style.display==='none'?'grid':'none';header.querySelector('.fold-mark i').setAttribute('data-lucide',grid.style.display==='none'?'chevron-down':'chevron-up');refreshIcons()};names.forEach(name=>{const b=document.createElement('button');b.type='button';b.className=`member-btn ${c.btnClass}${workingRecord.includes(name)?' active':''}`;b.textContent=name;b.onclick=()=>toggleAttendance(name,b);grid.appendChild(b)});elAttendance.appendChild(section)});updateAllVisuals();refreshIcons()}
function toggleAttendance(name,btn){const i=workingRecord.indexOf(name);if(i>-1){workingRecord.splice(i,1);btn.classList.remove('active')}else{workingRecord.push(name);btn.classList.add('active')}isDirty=true;updateSaveIndicator(false);updateAllVisuals()}
function updateAllVisuals(){updateSummary();renderCategorySummary();const m=getMembers();CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],section=document.getElementById(`section-${c.key}`);if(!section)return;const names=m[c.key]||[],att=names.filter(n=>workingRecord.includes(n)).length;section.querySelector('.cat-sub').textContent=`전체 ${names.length}명 · 출석 ${att}명`})}
function saveCurrentRecord(){const r=getRecords(),date=elDate.value,type=elType.value;if(!workingRecord.length&&!confirm('출석자가 0명입니다. 저장하시겠습니까?'))return;if(!r[date])r[date]={};r[date][type]=[...workingRecord];if(!r[date][type].length){delete r[date][type];if(!Object.keys(r[date]).length)delete r[date]}saveRecords();isDirty=false;const exists=r[date]&&r[date][type];updateSaveIndicator(!!exists);updateRecordStatusBanner(!!exists);alert('저장되었습니다.')}
function confirmIfDirty(){return !isDirty||confirm('저장하지 않은 변경사항이 있습니다. 변경사항을 버리고 이동하시겠습니까?')}function createNameRow(catKey,name){const row=document.createElement('div');row.className='setup-name-row';row.innerHTML=`<input type="text" class="setup-name-input" placeholder="이름 입력"><button class="btn-remove-name" type="button">×</button>`;row.querySelector('input').value=name||'';row.querySelector('button').onclick=()=>{const list=document.getElementById(`setup-list-${catKey}`);if(list.querySelectorAll('.setup-name-row').length===1)row.querySelector('input').value='';else row.remove()};return row}
function openSetup(){const m=getMembers();document.getElementById('setup-district-label').textContent=`(${elDistrict.value})`;const cont=document.getElementById('setup-cat-list');cont.innerHTML='';CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],block=document.createElement('div');block.className='setup-cat-block';block.innerHTML=`<div class="setup-cat-label ${c.btnClass}">${c.name}</div><div class="setup-name-list" id="setup-list-${c.key}"></div><button class="btn-add-name" type="button">+ 이름 추가</button>`;const list=block.querySelector('.setup-name-list');(m[c.key]&&m[c.key].length?m[c.key]:['']).forEach(n=>list.appendChild(createNameRow(c.key,n)));block.querySelector('.btn-add-name').onclick=()=>{const row=createNameRow(c.key,'');list.appendChild(row);row.querySelector('input').focus()};cont.appendChild(block)});document.getElementById('setup-modal').classList.add('show')}
function saveSetup(){const data={eun:[],bong:[],mom:[],youth:[]};CAT_ORDER.forEach(k=>{const c=CATEGORIES[k];data[c.key]=Array.from(document.querySelectorAll(`#setup-list-${c.key} .setup-name-input`)).map(i=>i.value.trim()).filter(Boolean)});allMembersData[elDistrict.value]=data;saveMembers();document.getElementById('setup-modal').classList.remove('show');loadWorkingRecord()}
function getSummary(){const m=getMembers(),d=new Date(elDate.value),dateStr=`${String(d.getFullYear()).slice(2)}.${d.getMonth()+1}.${d.getDate()}.`,rows=[];let total=0;CAT_ORDER.forEach(k=>{const c=CATEGORIES[k],names=m[c.key]||[];if(!names.length)return;const count=names.filter(n=>workingRecord.includes(n)).length;total+=count;rows.push({cat:c,names,count})});return{district:elDistrict.value,dateStr,type:elType.value,rows,total}}
function buildShareText(){const s=getSummary();let text=`${s.district} ${s.dateStr} ${s.type} 참석인원\n\n`;if(!s.rows.length)return text+'명단이 등록되지 않았습니다.';s.rows.forEach(r=>text+=`${r.cat.name} ${r.count}\n`);return text+`\n총 ${s.total}명 참석`}
function openShare(){document.getElementById('share-preview').textContent=buildShareText();document.getElementById('image-preview-wrap').style.display='none';document.getElementById('share-modal').classList.add('show')}
function shareAsText(){const text=buildShareText();navigator.clipboard?.writeText(text).then(()=>alert('텍스트가 복사되었습니다.')).catch(()=>alert(text))}
function shareAsImage(){const s=getSummary(),card=document.getElementById('capture-card'),wrap=document.getElementById('cap-categories');document.getElementById('cap-title').textContent=`${s.district} ${s.type} 참석인원`;document.getElementById('cap-sub').textContent=s.dateStr;wrap.innerHTML='';s.rows.forEach(r=>{const sec=document.createElement('div');sec.innerHTML=`<div class="cap-cat-title ${r.cat.btnClass}">${r.cat.name} ${r.count}/${r.names.length}</div><div class="cap-name-grid">${r.names.map(n=>`<div class="cap-name-btn ${r.cat.btnClass}${workingRecord.includes(n)?' active':''}">${n}</div>`).join('')}</div>`;wrap.appendChild(sec)});document.getElementById('cap-total').textContent=`총 ${s.total}명 참석`;card.style.top='0';card.style.left='0';html2canvas(card,{scale:2,backgroundColor:'#fff'}).then(canvas=>{card.style.top='-9999px';card.style.left='-9999px';canvas.toBlob(blob=>{lastGeneratedImageBlob=blob;lastGeneratedImageFilename=`출석_${s.district}_${s.dateStr.replace(/\./g,'')}.png`;document.getElementById('image-preview').src=canvas.toDataURL('image/png');document.getElementById('image-preview-wrap').style.display='block'},'image/png')})}
function downloadImage(){if(!lastGeneratedImageBlob)return alert('먼저 [이미지 만들기]를 눌러주세요.');const url=URL.createObjectURL(lastGeneratedImageBlob),a=document.createElement('a');a.href=url;a.download=lastGeneratedImageFilename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function renderStats(){const r=getRecords(),m=getMembers(),box=document.getElementById('stats-container'),dates=Object.keys(r).filter(d=>/^\d{4}-\d{2}-\d{2}$/.test(d)).sort();box.innerHTML='';if(!dates.length){box.innerHTML='<div class="empty-msg">아직 저장된 출석 기록이 없습니다.</div>';return}const table=document.createElement('table');table.className='stats-table';table.innerHTML='<thead><tr><th>날짜</th><th>구분</th><th>출석</th><th>전체</th><th>출석률</th></tr></thead><tbody></tbody>';const tbody=table.querySelector('tbody');dates.forEach(date=>{const attendees=r[date][currentStatsType];if(!attendees)return;const total=CAT_ORDER.reduce((s,k)=>s+(m[CATEGORIES[k].key]||[]).length,0),att=attendees.length;tbody.innerHTML+=`<tr><td>${date}</td><td>${currentStatsType}</td><td>${att}명</td><td>${total}명</td><td>${total?Math.round(att/total*100):0}%</td></tr>`});box.appendChild(table)}
function openPrayer(){document.getElementById('prayer-text').value=(allPrayerData[elDistrict.value]||'');document.getElementById('prayer-modal').classList.add('show')}function savePrayer(){allPrayerData[elDistrict.value]=document.getElementById('prayer-text').value;localStorage.setItem(STORAGE_KEY_PRAYERS,JSON.stringify(allPrayerData));alert('저장되었습니다.')}
function initEventListeners(){elDistrict.onchange=e=>{if(!confirmIfDirty()){e.target.value=localStorage.getItem(STORAGE_KEY_LASTDISTRICT)||'11구역';return}localStorage.setItem(STORAGE_KEY_LASTDISTRICT,elDistrict.value);loadWorkingRecord()};elDate.onchange=()=>{if(confirmIfDirty())loadWorkingRecord()};elType.onchange=()=>{if(confirmIfDirty()){previousMeetingType=elType.value;loadWorkingRecord()}else elType.value=previousMeetingType};document.querySelector('.btn-setup').onclick=openSetup;document.getElementById('save-setup').onclick=saveSetup;elBtnSaveRecord.onclick=saveCurrentRecord;document.querySelector('.btn-share').onclick=openShare;document.getElementById('btn-share-text').onclick=shareAsText;document.getElementById('btn-share-image').onclick=shareAsImage;document.getElementById('btn-download-image').onclick=downloadImage;document.querySelector('.btn-stats').onclick=()=>{renderStats();document.getElementById('stats-modal').classList.add('show')};document.querySelector('.btn-prayer').onclick=openPrayer;document.getElementById('save-prayer').onclick=savePrayer;document.querySelectorAll('.stats-tab').forEach(t=>t.onclick=()=>{currentStatsType=t.dataset.type;document.querySelectorAll('.stats-tab').forEach(x=>x.classList.remove('active-tab'));t.classList.add('active-tab');renderStats()});document.querySelectorAll('.close-modal').forEach(b=>b.onclick=()=>document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show')));window.onclick=e=>{if(e.target.classList.contains('modal'))e.target.classList.remove('show')};window.onbeforeunload=e=>{if(isDirty){e.preventDefault();e.returnValue=''}}}
function init(){buildDistrictDropdown();elDate.value=new Date().toISOString().split('T')[0];previousMeetingType=elType.value;loadData();loadWorkingRecord();initEventListeners();refreshIcons()}init();
</script>
</body>
